title: "날자 아카이브"
tagline: "AI 시대, 지적장애인의 배움과 일상"
description: "도서출판 날자와 날자꾸러미가 지적장애인의 배움, 문해력, 유추와 일상 적용을 연구하고 기록하는 전문 아카이브입니다."
lang: ko-KR
url: "https://yunycho.github.io"
baseurl: "/naljabooks-blog"
author:
  name: "도서출판 날자 · 날자꾸러미 편집부"
  url: "https://naljabooks.com"
  type: Organization
logo: "/assets/images/share-default.svg"
social:
  name: "도서출판 날자 · 날자꾸러미 편집부"
  links:
    - "https://naljabooks.com"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
permalink: /archive/:title/
timezone: Asia/Seoul
future: false
strict_front_matter: true
defaults:
  - scope:
      path: ""
    values:
      image: "/assets/images/share-default.svg"
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author:
        name: "도서출판 날자 · 날자꾸러미 편집부"
        url: "https://naljabooks.com"
        type: Organization
      category: "유추와 문해력"
exclude:
  - docs
  - naver-drafts
  - scripts
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
